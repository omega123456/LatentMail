<div class="search-bar"
     data-testid="search-bar"
     [class.focused]="focused()"
     [attr.aria-busy]="aiStore.searchStreamStatus() === 'searching' ? 'true' : null">
  <span class="material-symbols-outlined search-icon">search</span>
  <input
    class="search-bar-input"
    data-testid="search-input"
    type="text"
    [placeholder]="searchMode() === 'semantic' ? 'Ask AI to find emails...' : 'Search emails...'"
    [value]="query()"
    [readonly]="aiStore.searchStreamStatus() === 'searching'"
    (input)="query.set($any($event.target).value)"
    (keydown)="onKeydown($event)"
    (focus)="focused.set(true)"
    (blur)="focused.set(false)"
  />
  @if (aiStore.searchLoading()) {
    <span class="material-symbols-outlined spinning search-loading">sync</span>
  }
  @if (query() && aiStore.searchStreamStatus() !== 'searching') {
    <button class="search-action-btn" (click)="onClear()" title="Clear search" data-testid="search-clear-button">
      <span class="material-symbols-outlined">close</span>
    </button>
  }
  @if (aiStore.isAvailable() && aiStore.indexStatus() === 'complete') {
    <div class="search-mode-toggle" role="group" aria-label="Search mode">
      <button
        class="search-mode-btn"
        [attr.aria-pressed]="searchMode() === 'keyword'"
        aria-label="Keyword search"
        data-testid="search-mode-keyword"
        [disabled]="aiStore.searchStreamStatus() === 'searching'"
        (click)="setSearchMode('keyword')"
        title="Keyword search"
      >
        <span class="material-symbols-outlined">text_fields</span>
      </button>
      <button
        class="search-mode-btn"
        [attr.aria-pressed]="searchMode() === 'semantic'"
        aria-label="Semantic search"
        data-testid="search-mode-semantic"
        [disabled]="aiStore.searchStreamStatus() === 'searching'"
        (click)="setSearchMode('semantic')"
        title="Semantic AI search"
      >
        <span class="material-symbols-outlined">auto_awesome</span>
      </button>
    </div>
  }
</div>
