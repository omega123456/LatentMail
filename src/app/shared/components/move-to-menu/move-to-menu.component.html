<div class="move-to-menu">
  <!-- Trigger button (origin for overlay) -->
  <button
    #trigger
    class="move-to-trigger"
    (click)="toggle(); $event.stopPropagation()"
    [attr.aria-haspopup]="true"
    [attr.aria-expanded]="isOpen()"
    title="Move to folder"
  >
    <span class="material-symbols-outlined">drive_file_move</span>
    <span class="trigger-label">Move to</span>
  </button>

  <!-- Dropdown panel content (attached to overlay when open) -->
  <ng-template #dropdownPanel>
    <div
      class="move-to-dropdown"
      role="menu"
      aria-label="Move to folder"
      tabindex="-1"
      (keydown)="onMenuKeydown($event)"
      (click)="$event.stopPropagation()"
    >
      <!-- Search input (only shown when 10+ folders) -->
      @if (showSearch()) {
        <div class="move-to-search">
          <span class="material-symbols-outlined search-icon">search</span>
          <input
            type="text"
            class="search-input"
            placeholder="Find folder..."
            aria-label="Filter folders"
            [ngModel]="searchText()"
            (ngModelChange)="searchText.set($event); focusedIndex.set(-1)"
            (keydown)="onMenuKeydown($event)"
            (click)="$event.stopPropagation()"
          />
        </div>
      }

      <div class="move-to-list">
        <!-- System folders only -->
        @for (folder of filteredSystemFolders(); track folder.gmailLabelId; let i = $index) {
          <button
            class="folder-item"
            role="menuitem"
            [class.focused]="focusedIndex() === i"
            (click)="selectFolder(folder)"
            (mouseenter)="focusedIndex.set(i)"
          >
            <span class="material-symbols-outlined folder-icon">{{ getFolderIcon(folder) }}</span>
            <span class="folder-name">{{ folder.name }}</span>
          </button>
        }

        <!-- Empty state -->
        @if (flatItems().length === 0) {
          <div class="folder-empty">No matching folders</div>
        }
      </div>
    </div>
  </ng-template>
</div>
