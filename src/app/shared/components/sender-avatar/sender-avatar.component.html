<div [class]="avatarClass()" class="sender-avatar-wrapper" data-testid="sender-avatar">
  @if (bimiLogoUrl()) {
    <img
      class="sender-avatar-img"
      [src]="sanitizedLogoUrl()"
      [alt]="''"
      referrerPolicy="no-referrer"
    />
  }
  @if (showInitial()) {
    <span class="sender-avatar-initial" aria-hidden="true">{{ initial() }}</span>
  }
</div>
