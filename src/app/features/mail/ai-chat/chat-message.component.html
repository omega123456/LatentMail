@if (message().role === 'user') {
  <div class="message user-message">
    <div class="message-bubble">{{ message().content }}</div>
  </div>
} @else {
  <div class="message ai-message">
    <div class="ai-message-header">
      <span class="material-symbols-outlined ai-icon" aria-hidden="true">auto_awesome</span>
    </div>
    <div class="ai-message-body">
      @if (message().error) {
        <div class="error-text">{{ message().error }}</div>
      } @else {
        <div class="message-content" [class.streaming]="message().streaming" [innerHTML]="formatContent(getDisplayContent())" aria-live="off"></div>
      }

      @if (message().sources && message().sources.length > 0) {
        <div class="sources-section" aria-label="Source emails">
          <div class="sources-label">SOURCES</div>
          <div class="sources-list">
            @for (source of message().sources; track source.xGmMsgId; let idx = $index) {
              <app-source-card
                [source]="source"
                [displayIndex]="idx + 1"
                (sourceClicked)="onSourceClicked($event)"
              />
            }
          </div>
        </div>
      }
    </div>
  </div>
}
