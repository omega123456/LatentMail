<div class="email-list-header">
  <div class="header-left">
    <span class="folder-name">{{ foldersStore.activeFolder()?.name || 'Inbox' }}</span>
  </div>
  <div class="header-actions">
    <!-- Sync / Refresh button -->
    <button
      class="header-btn"
      (click)="onSyncClick()"
      [disabled]="emailsStore.syncing()"
      [title]="emailsStore.syncing() ? 'Syncing...' : 'Refresh'"
      [attr.aria-label]="emailsStore.syncing() ? 'Syncing folder' : 'Refresh folder'"
      [attr.aria-busy]="emailsStore.syncing()"
    >
      <span
        class="material-symbols-outlined"
        [class.spinning]="emailsStore.syncing()"
      >refresh</span>
    </button>

    @if (emailsStore.syncing()) {
      <span class="sync-time">Syncing...</span>
    } @else if (emailsStore.lastSyncTime()) {
      <span class="sync-time">{{ relativeTime() }}</span>
    }

    <!-- AI Categorize button -->
    <button
      class="header-btn"
      (click)="categorizeVisible()"
      [disabled]="!aiStore.isAvailable() || aiStore.categorizeLoading()"
      [title]="aiStore.isAvailable() ? 'AI Categorize' : 'Ollama not connected'"
    >
      <span
        class="material-symbols-outlined"
        [class.spinning]="aiStore.categorizeLoading()"
      >{{ aiStore.categorizeLoading() ? 'sync' : 'auto_awesome' }}</span>
    </button>

    <!-- Density toggle -->
    <button class="header-btn" (click)="cycleDensity()" title="Change density">
      <span class="material-symbols-outlined">
        {{ densityIcon() }}
      </span>
    </button>

    <!-- Layout toggle -->
    <button class="header-btn" (click)="cycleLayout()" title="Change layout">
      <span class="material-symbols-outlined">
        {{ layoutIcon() }}
      </span>
    </button>
  </div>
</div>

<!-- Category filter tabs (shown when categories have been computed) -->
@if (hasCachedCategories()) {
  <div class="category-tabs">
    <button
      class="category-tab"
      [class.active]="activeFilter() === null"
      (click)="setFilter(null)"
    >All</button>
    @for (category of categories; track category) {
      <button
        class="category-tab"
        [class.active]="activeFilter() === category"
        (click)="setFilter(category)"
      >{{ category }}</button>
    }
  </div>
}
