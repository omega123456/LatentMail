<div class="status-bar" [class.sync-paused]="syncPaused()" data-testid="status-bar">
  <div class="status-left">
    @if (syncPaused()) {
      <button
        type="button"
        class="status-item sync-paused-badge sync-resume-btn"
        title="Resume background sync"
        aria-label="Resume background sync"
        (click)="resumeSync()">
        <span class="material-symbols-outlined">play_circle</span>
        Resume
      </button>
      <span class="status-separator">|</span>
    } @else {
      <button
        type="button"
        class="status-item sync-pause-btn"
        title="Pause background sync"
        aria-label="Pause background sync"
        (click)="pauseSync()">
        <span class="material-symbols-outlined">pause_circle</span>
        Pause
      </button>
      <span class="status-separator">|</span>
    }
    <button
      class="status-item sync-status"
      data-testid="sync-status-indicator"
      [class.syncing]="emailsStore.syncing()"
      [class.paused]="syncPaused()"
      [disabled]="emailsStore.syncing() || syncPaused()"
      [title]="syncPaused() ? 'Sync is paused — click Resume to re-enable' : (emailsStore.syncing() ? 'Syncing...' : fullTimestamp() + ' — click to refresh')"
      [attr.aria-label]="syncPaused() ? 'Sync paused' : (emailsStore.syncing() ? 'Syncing' : 'Refresh — last synced ' + relativeTime())"
      [attr.aria-busy]="emailsStore.syncing()"
      (click)="triggerManualSync()">
      @if (emailsStore.syncing()) {
        <span class="material-symbols-outlined spinning">sync</span>
        Syncing{{ emailsStore.syncProgress() > 0 ? ' ' + emailsStore.syncProgress() + '%' : '...' }}
      } @else if (syncPaused()) {
        <span class="material-symbols-outlined">schedule</span>
        Last synced: {{ relativeTime() }}
      } @else {
        <span class="material-symbols-outlined">schedule</span>
        Last synced: {{ relativeTime() }}
      }
    </button>
    <span class="status-separator">|</span>
    <span class="status-item">
      {{ accountsStore.accountCount() }} account{{ accountsStore.accountCount() !== 1 ? 's' : '' }}
    </span>
    <span class="status-separator">|</span>
    <span class="status-item ai-status" [class.connected]="aiStore.connected()" [class.disconnected]="!aiStore.connected()">
      <span class="material-symbols-outlined">auto_awesome</span>
      {{ aiStore.statusLabel() }}
    </span>
    <span class="status-separator">|</span>
    <button
      class="status-item queue-status"
      [class.processing]="combinedIsProcessing()"
      [class.failed]="combinedHasFailed()"
      [class.pending]="queueStore.activeCount() > 0 && !combinedIsProcessing() && !combinedHasFailed()"
      [class.idle]="combinedIsIdle()"
      [title]="queueTooltip()"
      [attr.aria-label]="queueAriaLabel()"
      aria-live="polite"
      role="status"
      (click)="navigateToQueue()">
      <span
        class="material-symbols-outlined"
        [class.spinning]="combinedIsProcessing()">
        {{ queueIcon() }}
      </span>
      <span class="queue-count">
        @if (combinedHasFailed()) {
          {{ combinedFailedCount() }} failed
        } @else {
          {{ queueStore.activeCount() }}
        }
      </span>
      @if (combinedFailedCount() > 0 && combinedIsProcessing()) {
        <span class="queue-failed-dot" title="{{ combinedFailedCount() }} failed"></span>
      }
    </button>
  </div>
  <div class="status-right">
    <span class="status-item hint">
      Ctrl+K
    </span>
  </div>
</div>
