<div class="status-bar">
  <div class="status-left">
    <button
      class="status-item sync-status"
      [class.syncing]="emailsStore.syncing()"
      [disabled]="emailsStore.syncing()"
      [title]="emailsStore.syncing() ? 'Syncing...' : fullTimestamp() + ' — click to refresh'"
      [attr.aria-label]="emailsStore.syncing() ? 'Syncing' : 'Refresh — last synced ' + relativeTime()"
      [attr.aria-busy]="emailsStore.syncing()"
      (click)="triggerManualSync()">
      @if (emailsStore.syncing()) {
        <span class="material-symbols-outlined spinning">sync</span>
        Syncing{{ emailsStore.syncProgress() > 0 ? ' ' + emailsStore.syncProgress() + '%' : '...' }}
      } @else {
        <span class="material-symbols-outlined">schedule</span>
        Last synced: {{ relativeTime() }}
      }
    </button>
    <span class="status-separator">|</span>
    <span class="status-item">
      {{ accountsStore.accountCount() }} account{{ accountsStore.accountCount() !== 1 ? 's' : '' }}
    </span>
    <span class="status-separator">|</span>
    <span class="status-item ai-status" [class.connected]="aiStore.connected()" [class.disconnected]="!aiStore.connected()">
      <span class="material-symbols-outlined">auto_awesome</span>
      {{ aiStore.statusLabel() }}
    </span>
    <span class="status-separator">|</span>
    <button
      class="status-item queue-status"
      [class.processing]="queueStore.processingCount() > 0"
      [class.failed]="queueStore.failedCount() > 0 && queueStore.processingCount() === 0"
      [class.pending]="queueStore.pendingCount() > 0 && queueStore.processingCount() === 0 && queueStore.failedCount() === 0"
      [class.idle]="queueStore.activeCount() === 0 && queueStore.failedCount() === 0"
      [title]="queueTooltip()"
      [attr.aria-label]="queueAriaLabel()"
      aria-live="polite"
      role="status"
      (click)="navigateToQueue()">
      <span
        class="material-symbols-outlined"
        [class.spinning]="queueStore.processingCount() > 0">
        {{ queueIcon() }}
      </span>
      <span class="queue-count">
        @if (queueStore.failedCount() > 0 && queueStore.processingCount() === 0 && queueStore.pendingCount() === 0) {
          {{ queueStore.failedCount() }} failed
        } @else {
          {{ queueStore.activeCount() }}
        }
      </span>
      @if (queueStore.failedCount() > 0 && queueStore.processingCount() > 0) {
        <span class="queue-failed-dot" title="{{ queueStore.failedCount() }} failed"></span>
      }
    </button>
  </div>
  <div class="status-right">
    <span class="status-item hint">
      Ctrl+K
    </span>
  </div>
</div>
