@if (hasAttachments()) {
  <div class="attachments-section">
    <div class="attachments-header">
      <span class="material-symbols-outlined attachments-header-icon">attach_file</span>
      <span class="attachments-count">{{ attachments().length }} attachment{{ attachments().length !== 1 ? 's' : '' }}</span>
    </div>
    <div class="attachments-list">
      @for (att of attachments(); track att.id) {
        <div class="attachment-chip" [class.downloading]="isDownloading(att.id)">
          <span class="material-symbols-outlined att-type-icon">{{ getMimeIcon(att.mimeType) }}</span>
          <div class="att-info">
            <span class="att-filename" [title]="att.filename">{{ att.filename }}</span>
            @if (att.size != null) {
              <span class="att-size">{{ att.size | fileSize }}</span>
            }
          </div>
          <button
            class="att-download-btn"
            [disabled]="isDownloading(att.id)"
            [title]="isDownloading(att.id) ? 'Downloading…' : 'Download ' + att.filename"
            (click)="downloadAttachment(att)"
          >
            @if (isDownloading(att.id)) {
              <span class="material-symbols-outlined spinning">sync</span>
            } @else {
              <span class="material-symbols-outlined">download</span>
            }
          </button>
        </div>
      }
    </div>
  </div>
}
