<div #wrapper class="email-body-frame-wrapper">
  @if (imagesBlocked()) {
    <div class="remote-images-banner" role="alert" aria-live="polite">
      <span class="material-symbols-outlined banner-icon" aria-hidden="true">photo_library</span>
      <span class="banner-text">Remote images are blocked.</span>
      @if (!isSpamFolder()) {
        <button
          type="button"
          class="banner-action"
          (click)="loadImagesOnce()"
        >Load images</button>
        @if (senderEmail()) {
          <button
            type="button"
            class="banner-action"
            (click)="alwaysAllowSender()"
            [title]="'Always load images from ' + senderEmail()"
          >Always allow from {{ senderEmail() }}</button>
        }
      }
    </div>
  }
  <iframe
    #frame
    class="email-body-frame"
    sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox"
    (load)="onIframeLoad()"
  ></iframe>
</div>
