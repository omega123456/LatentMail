<div class="settings-shell">
  <div class="settings-header">
    <a routerLink="/mail" class="back-link" data-testid="settings-back-link">
      <span class="material-symbols-outlined">arrow_back</span>
      Back to Mail
    </a>
    <h1>Settings</h1>
  </div>
  <div class="settings-body">
    <nav class="settings-nav" data-testid="settings-nav">
      <a class="nav-item" routerLink="general" routerLinkActive="active" data-testid="settings-nav-general">
        <span class="material-symbols-outlined">settings</span>
        General
      </a>
      <a class="nav-item" routerLink="accounts" routerLinkActive="active" data-testid="settings-nav-accounts">
        <span class="material-symbols-outlined">account_circle</span>
        Accounts
      </a>
      <a class="nav-item" routerLink="ai" routerLinkActive="active" data-testid="settings-nav-ai">
        <span class="material-symbols-outlined">auto_awesome</span>
        AI
      </a>
      <a class="nav-item" routerLink="keyboard" routerLinkActive="active" data-testid="settings-nav-keyboard">
        <span class="material-symbols-outlined">keyboard</span>
        Keyboard
      </a>
      <a class="nav-item" routerLink="filters" routerLinkActive="active" data-testid="settings-nav-filters">
        <span class="material-symbols-outlined">filter_list</span>
        Filters
      </a>
      <a class="nav-item" routerLink="queue" routerLinkActive="active" data-testid="settings-nav-queue">
        <span class="material-symbols-outlined">pending_actions</span>
        Queue
      </a>
      <a class="nav-item" routerLink="logger" routerLinkActive="active" data-testid="settings-nav-logger">
        <span class="material-symbols-outlined">description</span>
        Logger
      </a>
    </nav>
    <div class="settings-content" data-testid="settings-content">
      <div class="settings-content-inner">
        <router-outlet />
      </div>
    </div>
  </div>
</div>
